<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPS 请求拦截日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        /* 顶部栏 */
        .header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            color: #e94560;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: bold;
            color: #4ecca3;
        }

        .stat-value.warning {
            color: #ffc107;
        }

        .stat-value.error {
            color: #e94560;
        }

        /* 连接状态 */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ecca3;
        }

        .status-dot.disconnected {
            background: #e94560;
        }

        /* 工具栏 */
        .toolbar {
            padding: 12px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 16px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background: #3db892;
        }

        .btn-danger {
            background: #e94560;
            color: #fff;
        }

        .btn-danger:hover {
            background: #d63851;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        /* 日志列表 */
        .content {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 16px;
            padding: 16px 24px;
            height: calc(100vh - 112px);
        }

        .log-list {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-list-header {
            padding: 10px 12px;
            font-size: 12px;
            color: #6c757d;
            border-bottom: 1px solid #0f3460;
            background: #111a33;
        }

        .log-list-body {
            overflow-y: auto;
            flex: 1;
        }

        .log-item {
            border-bottom: 1px solid #0f3460;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .log-item:hover {
            background: rgba(78, 204, 163, 0.08);
        }

        .log-item.active {
            background: rgba(78, 204, 163, 0.15);
            border-left: 3px solid #4ecca3;
        }

        .log-item.token-detected {
            border-left: 4px solid #ffc107;
        }

        .log-item.error {
            border-left: 4px solid #e94560;
        }

        /* 日志头部 */
        .log-header {
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .method-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        .method-GET { background: #4ecca3; color: #1a1a2e; }
        .method-POST { background: #ffc107; color: #1a1a2e; }
        .method-PUT { background: #17a2b8; color: #fff; }
        .method-DELETE { background: #e94560; color: #fff; }
        .method-PATCH { background: #6f42c1; color: #fff; }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-2xx { background: #4ecca3; color: #1a1a2e; }
        .status-3xx { background: #17a2b8; color: #fff; }
        .status-4xx { background: #ffc107; color: #1a1a2e; }
        .status-5xx { background: #e94560; color: #fff; }
        .status-0 { background: #6c757d; color: #fff; }

        .log-url {
            flex: 1;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #adb5bd;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            gap: 4px;
        }

        .url-start,
        .url-end {
            color: #adb5bd;
            white-space: nowrap;
        }

        .url-ellipsis {
            color: #6c757d;
        }

        .log-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #6c757d;
        }

        .duration {
            color: #4ecca3;
        }

        .token-warning {
            color: #ffc107;
            font-weight: bold;
        }

        /* 详情面板 */
        .log-detail {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
        }

        .detail-empty {
            color: #6c757d;
            text-align: center;
            padding: 60px 24px;
        }

        .detail-section {
            padding: 16px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #6c757d;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-count {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .detail-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .column-title {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 8px;
        }

        /* Headers 表格 */
        .headers-table {
            width: 100%;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .headers-table tr {
            border-bottom: 1px solid #0f3460;
        }

        .headers-table tr:last-child {
            border-bottom: none;
        }

        .headers-table td {
            padding: 6px 0;
            vertical-align: top;
        }

        .headers-table .header-name {
            color: #4ecca3;
            width: 200px;
            padding-right: 16px;
        }

        .headers-table .header-value {
            color: #adb5bd;
            word-break: break-all;
        }

        .header-value.sensitive {
            color: #ffc107;
        }

        .headers-table .extra {
            display: none;
        }

        .headers-table.show-all .extra {
            display: table-row;
        }

        .headers-toggle {
            margin-top: 8px;
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
        }

        .headers-toggle:hover {
            color: #4ecca3;
        }

        /* JSON 格式化 */
        .json-viewer {
            background: #0d1b2a;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .json-key {
            color: #4ecca3;
        }

        .json-string {
            color: #ffc107;
        }

        .json-number {
            color: #e94560;
        }

        .json-boolean {
            color: #17a2b8;
        }

        .json-null {
            color: #6c757d;
        }

        .muted {
            color: #6c757d;
            font-style: italic;
        }

        /* 原始日志 */
        .raw-log-toggle {
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .raw-log-toggle:hover {
            color: #4ecca3;
        }

        .raw-log-content {
            display: none;
            margin-top: 12px;
        }

        .raw-log-content.visible {
            display: block;
        }

        .raw-log-content pre {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #1a4a7a;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                height: auto;
            }
            .log-detail {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HTTPS 请求拦截日志</h1>
        <div class="header-stats">
            <div class="stat-item">
                <span>总请求:</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-item">
                <span>Token 检测:</span>
                <span class="stat-value warning" id="stat-tokens">0</span>
            </div>
            <div class="stat-item">
                <span>错误:</span>
                <span class="stat-value error" id="stat-errors">0</span>
            </div>
            <div class="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">已连接</span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索 URL、请求体、响应体...">
        </div>
        <button class="btn btn-secondary" onclick="refreshLogs()">刷新</button>
        <button class="btn btn-danger" onclick="clearLogs()">清空日志</button>
    </div>

    <div class="content">
        <div class="log-list" id="log-list">
            <div class="log-list-header">最新请求</div>
            <div class="log-list-body" id="log-list-body">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">📡</div>
                    <p>等待接收日志...</p>
                    <p style="margin-top: 8px; font-size: 12px;">确保 Android 应用已配置日志发送到此服务器</p>
                </div>
            </div>
        </div>
        <div class="log-detail" id="log-detail">
            <div class="detail-empty">请选择左侧日志查看详情</div>
        </div>
    </div>

    <script>
        // 状态
        let logs = [];
        let ws = null;
        let searchTimeout = null;
        let selectedLogId = null;

        // DOM 元素
        const logListBody = document.getElementById('log-list-body');
        const emptyState = document.getElementById('empty-state');
        const logDetail = document.getElementById('log-detail');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const searchInput = document.getElementById('search-input');

        // 初始化 WebSocket
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusDot.classList.remove('disconnected');
                statusText.textContent = '已连接';
            };

            ws.onclose = () => {
                statusDot.classList.add('disconnected');
                statusText.textContent = '已断开';
                // 尝试重连
                setTimeout(initWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);

                if (message.type === 'initial_logs') {
                    logs = message.data;
                    renderLogs();
                } else if (message.type === 'new_log') {
                    logs.unshift(message.data);
                    prependLog(message.data);
                    updateStats();
                } else if (message.type === 'logs_cleared') {
                    logs = [];
                    renderLogs();
                }
            };
        }

        // 渲染所有日志
        function renderLogs() {
            if (logs.length === 0) {
                logListBody.innerHTML = '';
                logListBody.appendChild(emptyState);
                emptyState.style.display = 'block';
                logDetail.innerHTML = '<div class="detail-empty">请选择左侧日志查看详情</div>';
                selectedLogId = null;
            } else {
                emptyState.style.display = 'none';
                logListBody.innerHTML = logs.map(log => createListItemHTML(log)).join('');
                if (!selectedLogId && logs[0]) {
                    selectLog(logs[0].id);
                } else {
                    markActive();
                }
            }
            updateStats();
        }

        // 添加单条日志到顶部
        function prependLog(log) {
            emptyState.style.display = 'none';
            const html = createListItemHTML(log);
            logListBody.insertAdjacentHTML('afterbegin', html);
            if (!selectedLogId) {
                selectLog(log.id);
            } else {
                markActive();
            }
        }

        function createListItemHTML(log) {
            const methodClass = `method-${log.method}`;
            const statusClass = getStatusClass(log.statusCode);
            const itemClass = [
                'log-item',
                log.tokenDetected ? 'token-detected' : '',
                log.error ? 'error' : ''
            ].filter(Boolean).join(' ');

            return `
                <div class="${itemClass}" data-id="${log.id}" onclick="selectLog('${log.id}')">
                    <div class="log-header">
                        <span class="method-badge ${methodClass}">${log.method}</span>
                        <span class="status-badge ${statusClass}">${log.statusCode || 'ERR'}</span>
                        <span class="log-url" title="${escapeHtml(log.url)}">${shortenUrl(log.url)}</span>
                        <div class="log-meta">
                            <span class="duration">${log.durationMs}ms</span>
                            <span>${formatTime(log.timestamp)}</span>
                            ${log.tokenDetected ? '<span class="token-warning">⚠️ Token</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectLog(id) {
            selectedLogId = id;
            markActive();
            const log = logs.find(l => String(l.id) === String(id));
            if (!log) {
                logDetail.innerHTML = '<div class="detail-empty">未找到日志详情</div>';
                return;
            }
            logDetail.innerHTML = createDetailHTML(log);
        }

        function markActive() {
            document.querySelectorAll('.log-item').forEach(el => {
                el.classList.toggle('active', String(el.dataset.id) === String(selectedLogId));
            });
        }

        // 详情 HTML
        function createDetailHTML(log) {
            const requestHeaderCount = Object.keys(log.requestHeaders || {}).length;
            const responseHeaderCount = Object.keys(log.responseHeaders || {}).length;

            return `
                ${log.error ? `
                    <div class="detail-section">
                        <div class="detail-title">错误信息</div>
                        <div style="color: #e94560;">${escapeHtml(log.error)}</div>
                    </div>
                ` : ''}

                ${log.tokenDetected && log.tokenInfo ? `
                    <div class="detail-section" style="background: rgba(255, 193, 7, 0.1);">
                        <div class="detail-title">⚠️ Token 检测</div>
                        <pre style="color: #ffc107;">${escapeHtml(log.tokenInfo)}</pre>
                    </div>
                ` : ''}

                <div class="detail-section">
                    <div class="detail-title">请求 / 响应头</div>
                    <div class="detail-columns">
                        <div>
                            <div class="column-title">请求头 <span class="header-count">${requestHeaderCount} 个</span></div>
                            ${renderHeaders(log.requestHeaders, 2)}
                        </div>
                        <div>
                            <div class="column-title">响应头 <span class="header-count">${responseHeaderCount} 个</span></div>
                            ${renderHeaders(log.responseHeaders, 2)}
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-title">请求体</div>
                    <div class="json-viewer">${formatBody(log.requestBody)}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-title">响应体</div>
                    <div class="json-viewer">${formatBody(log.responseBody)}</div>
                </div>

                <div class="detail-section">
                    <div class="raw-log-toggle" onclick="toggleRawLog(this);">
                        ▶ 查看原始日志
                    </div>
                    <div class="raw-log-content">
                        <pre>${escapeHtml(log.rawLog || JSON.stringify(log, null, 2))}</pre>
                    </div>
                </div>
            `;
        }

        // 渲染 Headers（默认显示前 2 个）
        function renderHeaders(headers, limit) {
            if (!headers || Object.keys(headers).length === 0) {
                return '<div style="color: #6c757d; font-style: italic;">无</div>';
            }

            const sensitiveHeaders = ['authorization', 'cookie', 'x-auth-token', 'api-key', 'token'];
            const entries = Object.entries(headers);

            return `
                <table class="headers-table">
                    ${entries.map(([key, value], index) => {
                        const isSensitive = sensitiveHeaders.some(h =>
                            key.toLowerCase().includes(h)
                        );
                        const extraClass = index >= limit ? 'extra' : '';
                        return `
                            <tr class="${extraClass}">
                                <td class="header-name">${escapeHtml(key)}</td>
                                <td class="header-value ${isSensitive ? 'sensitive' : ''}">${escapeHtml(value)}</td>
                            </tr>
                        `;
                    }).join('')}
                </table>
                ${entries.length > limit ? `<div class="headers-toggle" onclick="toggleHeaders(this)">展开其余 ${entries.length - limit} 个</div>` : ''}
            `;
        }

        // 格式化 Body (JSON)
        function formatBody(body) {
            if (!body) return '<span class="muted">空</span>';

            try {
                const parsed = JSON.parse(body);
                return syntaxHighlight(JSON.stringify(parsed, null, 2));
            } catch (e) {
                return escapeHtml(body);
            }
        }

        // JSON 语法高亮
        function syntaxHighlight(json) {
            json = escapeHtml(json);
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // 获取状态码样式类
        function getStatusClass(code) {
            if (!code) return 'status-0';
            if (code >= 200 && code < 300) return 'status-2xx';
            if (code >= 300 && code < 400) return 'status-3xx';
            if (code >= 400 && code < 500) return 'status-4xx';
            if (code >= 500) return 'status-5xx';
            return 'status-0';
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '';
            let value = timestamp;
            if (typeof value === 'string' && value.trim() !== '') {
                const asNumber = Number(value);
                if (!Number.isNaN(asNumber)) {
                    value = asNumber;
                }
            }
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return 'invalid date';
            }
            return date.toLocaleTimeString('zh-CN');
        }

        // HTML 转义
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function shortenUrl(url) {
            if (!url) return '';
            const str = String(url);
            if (str.length <= 60) {
                return escapeHtml(str);
            }
            const start = str.slice(0, 32);
            const end = str.slice(-24);
            return `<span class="url-start">${escapeHtml(start)}</span><span class="url-ellipsis">…</span><span class="url-end">${escapeHtml(end)}</span>`;
        }

        // 切换原始日志
        function toggleRawLog(element) {
            const content = element.nextElementSibling;
            const isVisible = content.classList.toggle('visible');
            element.innerHTML = isVisible ? '▼ 隐藏原始日志' : '▶ 查看原始日志';
        }

        function toggleHeaders(element) {
            const table = element.previousElementSibling;
            const isExpanded = table.classList.toggle('show-all');
            const remaining = table.querySelectorAll('.extra').length;
            element.textContent = isExpanded ? '收起' : `展开其余 ${remaining} 个`;
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-total').textContent = logs.length;
            document.getElementById('stat-tokens').textContent =
                logs.filter(l => l.tokenDetected).length;
            document.getElementById('stat-errors').textContent =
                logs.filter(l => l.error).length;
        }

        // 刷新日志
        async function refreshLogs() {
            try {
                const response = await fetch('/api/logs?limit=100');
                const result = await response.json();
                if (result.success) {
                    logs = result.data;
                    renderLogs();
                }
            } catch (error) {
                console.error('Error refreshing logs:', error);
            }
        }

        // 清空日志
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？')) return;

            try {
                const response = await fetch('/api/logs', { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    logs = [];
                    renderLogs();
                }
            } catch (error) {
                console.error('Error clearing logs:', error);
            }
        }

        // 搜索
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const query = e.target.value.trim();
                if (query) {
                    try {
                        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                        const result = await response.json();
                        if (result.success) {
                            logs = result.data;
                            renderLogs();
                        }
                    } catch (error) {
                        console.error('Error searching:', error);
                    }
                } else {
                    refreshLogs();
                }
            }, 300);
        });

        // 初始化
        initWebSocket();
    </script>
</body>
</html>
