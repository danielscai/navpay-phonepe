<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录展示</title>
    <style>
        :root {
            --bg: #121826;
            --panel: #1a2235;
            --panel-strong: #101726;
            --text: #e6e9ef;
            --muted: #9aa4b2;
            --accent: #4ecca3;
            --accent-2: #ffb020;
            --danger: #e94560;
            --border: #273048;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(78, 204, 163, 0.08), transparent 45%),
                radial-gradient(circle at 80% 0%, rgba(233, 69, 96, 0.12), transparent 50%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: rgba(16, 23, 38, 0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        .topbar h1 {
            font-size: 20px;
            letter-spacing: 0.5px;
            color: var(--accent);
        }

        .topbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            cursor: pointer;
        }

        .index-btn {
            background: transparent;
            border: 1px dashed #3a4868;
            color: #9fb7ff;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        .index-btn:hover {
            border-color: #6b8cff;
            color: #c5d3ff;
        }

        .container {
            max-width: 1200px;
            margin: 24px auto 48px;
            padding: 0 24px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            min-height: 90px;
        }

        .summary-card h3 {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 20px;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }

        .toolbar input {
            flex: 1;
            min-width: 220px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel-strong);
            color: var(--text);
        }

        .toolbar .pill {
            font-size: 12px;
            color: var(--muted);
            border: 1px dashed var(--border);
            padding: 6px 10px;
            border-radius: 999px;
        }

        .table-wrap {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: #111829;
            font-size: 12px;
            color: var(--muted);
        }

        .pagination-actions {
            display: flex;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #111829;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tbody tr:hover {
            background: rgba(78, 204, 163, 0.08);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .badge.success {
            background: rgba(78, 204, 163, 0.2);
            color: var(--accent);
        }

        .badge.failed {
            background: rgba(233, 69, 96, 0.2);
            color: var(--danger);
        }

        .badge.pending {
            background: rgba(255, 176, 32, 0.2);
            color: var(--accent-2);
        }

        .amount {
            color: #7ee7c2;
            font-weight: 600;
        }

        .tx-type {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
        }

        .tx-type.incoming {
            color: #0d3b2d;
            background: rgba(78, 204, 163, 0.85);
            border-color: rgba(78, 204, 163, 0.95);
        }

        .tx-type.outgoing {
            color: #3b0d14;
            background: rgba(233, 69, 96, 0.85);
            border-color: rgba(233, 69, 96, 0.95);
        }

        .tx-type.pay {
            color: #3a2b0d;
            background: rgba(255, 176, 32, 0.9);
            border-color: rgba(255, 176, 32, 0.95);
        }

        .vpa-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s ease;
            position: relative;
        }

        .vpa-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: currentColor;
        }

        .vpa-tag.copied {
            background: rgba(78, 204, 163, 0.15);
            border-color: rgba(78, 204, 163, 0.6);
            transform: translateY(-1px);
        }

        .vpa-tag.copied::after {
            content: "已复制";
            position: absolute;
            top: -22px;
            right: 0;
            background: rgba(78, 204, 163, 0.9);
            color: #0b1b14;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .vpa-tag.copy-fail::after {
            content: "复制失败";
            position: absolute;
            top: -22px;
            right: 0;
            background: rgba(233, 69, 96, 0.9);
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .flags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .flag {
            font-size: 11px;
            border: 1px solid var(--border);
            padding: 3px 6px;
            border-radius: 6px;
            color: var(--muted);
        }

        .empty {
            padding: 48px 16px;
            text-align: center;
            color: var(--muted);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: min(90vw, 960px);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 14px;
        }

        .modal-body {
            padding: 12px 16px 16px;
            overflow: auto;
            font-size: 12px;
            background: #0c1220;
        }

        .json-compare {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 16px;
            align-items: start;
        }

        .json-col {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0b111d;
            max-height: 60vh;
            overflow: auto;
            font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        }

        .json-line {
            padding: 2px 10px;
            white-space: pre;
            color: #c9d4e1;
            line-height: 1.6;
        }

        .json-line.muted {
            color: #7b8796;
        }

        @media (max-width: 860px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tbody tr {
                border-bottom: 1px solid var(--border);
                padding: 12px 0;
            }

            td {
                border: none;
                padding: 6px 12px;
            }

            td::before {
                content: attr(data-label);
                display: block;
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>交易记录展示</h1>
        <div class="topbar-actions">
            <button class="btn" id="openAllJson">查看全部 JSON</button>
            <a class="btn" href="/index.html">返回日志首页</a>
        </div>
    </div>

    <div class="container">
        <div class="summary" id="summary"></div>

        <div class="toolbar">
            <input id="searchInput" type="text" placeholder="搜索：VPA / 收款方名称 / UTR / 交易ID" />
            <span class="pill" id="dataHint">数据来源：fromTimestamp=0 实际请求结果</span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>付款方</th>
                        <th>收款方</th>
                        <th>类型</th>
                        <th>金额</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="empty" id="emptyState" style="display:none;">未找到匹配记录</div>
            <div class="pagination" id="pagination">
                <div id="pageInfo">第 1 页 / 共 1 页</div>
                <div class="pagination-actions">
                    <button class="btn" id="prevPage">上一页</button>
                    <button class="btn" id="nextPage">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="jsonModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">JSON 详情</h3>
                <button class="btn" id="closeModal">关闭</button>
            </div>
            <div class="modal-body">
                <div id="modalSummary" style="margin-bottom:12px; color: var(--muted);"></div>
                <div class="json-compare">
                    <div class="json-col" id="jsonLeft"></div>
                    <div class="json-col" id="jsonRight"></div>
                </div>
            </div>
        </div>
    </div>

        function normalizeList(value) {
            if (!value) return [];
            if (Array.isArray(value)) return value;
            return [value];
        }

        function extractItems() {
            const changes = (rawResponse.response && rawResponse.response.changes) || [];
            return changes.map(change => {
                const views = Array.isArray(change.view) ? change.view : [];
                const primaryView = views.find(v => v && v.data && (v.data.paidFrom || v.data.receivedIn || v.data.to || v.data.from)) || views[0] || {};
                const data = primaryView.data || {};
                const paidFrom = normalizeList(data.paidFrom)[0] || {};
                const receivedIn = normalizeList(data.receivedIn)[0] || {};
                const to = normalizeList(data.to)[0] || {};
                const amountInfo = to.amountInfo || {};
                const fromObj = data.from || {};
                const toObj = data.to || {};

                let txType = '未知';
                if (primaryView.type === 'RECEIVED_PAYMENT' || data.receivedIn) {
                    txType = '收款';
                } else if (data.paidFrom || paidFrom.accountId) {
                    txType = '付款';
                } else if (data.to && (to.mcc && to.mcc !== '0000')) {
                    txType = '支付';
                }

                const amount = amountInfo.value || data.amount || paidFrom.amount || receivedIn.amount;
                const currency = amountInfo.currencyCode || 'INR';

                let fromName = '-';
                let fromAccount = '-';
                let fromVpa = '-';
                let toName = '-';
                let toVpa = '-';
                let toType = '-';
                let utr = '-';
                let upiTxn = '-';

                if (txType === '收款') {
                    fromName = fromObj.cbsName || fromObj.name || fromObj.phone || '-';
                    fromAccount = fromObj.phone || fromObj.userId || '-';
                    toName = receivedIn.accountHolderName || toObj.name || '-';
                    toVpa = receivedIn.vpa || '-';
                    toType = receivedIn.type || toObj.type || '-';
                    utr = receivedIn.utr || '-';
                    upiTxn = receivedIn.upiTransactionId || data.upiTransactionId || '-';
                } else {
                    fromName = paidFrom.accountHolderName || fromObj.name || '-';
                    fromAccount = paidFrom.accountNumber || paidFrom.accountId || fromObj.phone || '-';
                    fromVpa = paidFrom.vpa || '-';
                    toName = to.name || toObj.name || '-';
                    toVpa = to.vpa || to.fullVpa || toObj.upiNumber || '-';
                    toType = to.type || toObj.type || '-';
                    utr = paidFrom.utr || '-';
                    upiTxn = paidFrom.upiTransactionId || data.upiTransactionId || '-';
                }

                return {
                    createdAt: change.createdAt,
                    updatedAt: change.updatedAt,
                    unitId: change.unitId,
                    paymentState: data.paymentState || primaryView.state,
                    responseCode: data.responseCode || paidFrom.transactionResponseCode,
                    amount,
                    currency,
                    fromName,
                    fromAccount,
                    fromVpa,
                    toName,
                    toVpa,
                    toType,
                    transferMode: (data.context && data.context.transferMode) || '-',
                    message: (data.context && data.context.message) || '-',
                    utr,
                    upiTransactionId: upiTxn,
                    txType,
                    rawChange: change
                };
            }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        }

        function formatAmount(amount, currency) {
            if (amount === undefined || amount === null) return '-';
            const value = Number(amount);
            if (Number.isNaN(value)) return '-';
            return `${currency} ${(value / 100).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function formatTime(ms) {
            if (!ms) return '-';
            const date = new Date(ms);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

        function statusLabel(state) {
            if (state === 'COMPLETED') return '成功';
            if (state === 'FAILED') return '失败';
            if (state === 'PENDING') return '处理中';
            return '未知';
        }

        function statusClass(state) {
            if (state === 'COMPLETED') return 'success';
            if (state === 'FAILED') return 'failed';
            if (state === 'PENDING') return 'pending';
            return 'failed';
        }

            if (txType === '收款') return 'incoming';

            return '';

        function hashString(value) {
            let hash = 0;
            for (let i = 0; i < value.length; i++) {
                hash = (hash << 5) - hash + value.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function applyVpaColors() {
            const tags = Array.from(document.querySelectorAll('.vpa-tag[data-vpa]'));
            tags.forEach(tag => {
                const vpa = tag.dataset.vpa || '';
                if (!vpa) return;
                const hash = hashString(vpa);
                const hue = hash % 360;
                const color = `hsl(${hue} 70% 70%)`;
                tag.style.color = color;
                tag.style.borderColor = `hsl(${hue} 60% 40% / 0.6)`;
                tag.style.background = `hsl(${hue} 60% 20% / 0.25)`;
                tag.title = `点击复制: ${vpa}`;
            });
        }

        async function copyText(value) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(value);
                    return true;
                }
            } catch {
                // ignore
            }
            const textarea = document.createElement('textarea');
            textarea.value = value;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            let ok = false;
            try {
                ok = document.execCommand('copy');
            } catch {
                ok = false;
            }
            document.body.removeChild(textarea);
            return ok;
        }

        function bindVpaCopy() {
            const tags = Array.from(document.querySelectorAll('.vpa-tag[data-vpa]'));
            tags.forEach(tag => {
                if (tag.dataset.copyBound === '1') return;
                tag.dataset.copyBound = '1';
                tag.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const vpa = tag.dataset.vpa || '';
                    if (!vpa) return;
                    tag.classList.remove('copied', 'copy-fail');
                    const ok = await copyText(vpa);
                    const oldTitle = tag.title;
                    if (ok) {
                        tag.classList.add('copied');
                        tag.title = '已复制';
                    } else {
                        tag.classList.add('copy-fail');
                        tag.title = '复制失败';
                    }
                    setTimeout(() => {
                        tag.classList.remove('copied', 'copy-fail');
                        tag.title = oldTitle;
                    }, 900);
                });
            });
        }

        function explainValue(key, value) {
            const label = explanationMap[key] || `字段: ${key}`;
            if (value === null || value === undefined) return label;
            if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
                return label;
            }
            if (Array.isArray(value)) {
                return value.map(item => {
                    if (item && typeof item === 'object') {
                        return explainObject(item);
                    }
                    return label;
                });
            }
            if (typeof value === 'object') {
                return explainObject(value);
            }
            return label;
        }

        function explainObject(obj) {
            const result = Array.isArray(obj) ? [] : {};
            if (Array.isArray(obj)) {
                obj.forEach(item => {
                    if (item && typeof item === 'object') {
                        result.push(explainObject(item));
                    } else {
                        result.push('字段值');
                    }
                });
                return result;
            }
            Object.keys(obj).forEach(key => {
                result[key] = explainValue(key, obj[key]);
            });
            return result;
        }

        function renderJsonCompare(payload) {
            const jsonText = JSON.stringify(payload, null, 2);
            const explainJson = explainObject(payload);
            const explainText = JSON.stringify(explainJson, null, 2);

            const leftLines = jsonText.split('\n');
            const rightLines = explainText.split('\n');
            const maxLines = Math.max(leftLines.length, rightLines.length);
            const leftHtml = [];
            const rightHtml = [];

            for (let i = 0; i < maxLines; i++) {
                const leftLine = leftLines[i] || '';
                const rightLine = rightLines[i] || '';
                leftHtml.push(`<div class=\"json-line\">${escapeHtml(leftLine)}</div>`);
                rightHtml.push(`<div class=\"json-line\">${escapeHtml(rightLine)}</div>`);
            }

            jsonLeft.innerHTML = leftHtml.join('');
            jsonRight.innerHTML = rightHtml.join('');
        }

                <div class="summary-card">
                    <h3>最近一笔</h3>
                    <div class="value">${data[0] ? formatTime(data[0].createdAt) : '-'}</div>
                </div>
            `;
        }

        function applySearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (!keyword) {
                filteredData = transactions.slice();
                renderSummary(filteredData);
                render(filteredData, 1);
                return;
            }
            filteredData = transactions.filter(item => {
                return [
                    item.toName,
                    item.toVpa,
                    item.fromVpa,
                    item.utr,
                    item.upiTransactionId,
                    item.unitId,
                    item.fromName
                ].some(val => String(val || '').toLowerCase().includes(keyword));
            });
            renderSummary(filteredData);
            render(filteredData, 1);
        }

        openAllJson.addEventListener('click', () => openJson('全部交易 JSON', rawResponse));
        closeModal.addEventListener('click', () => jsonModal.classList.remove('active'));
        jsonModal.addEventListener('click', (e) => {
            if (e.target === jsonModal) jsonModal.classList.remove('active');
        });
        jsonLeft.addEventListener('scroll', () => {
            jsonRight.scrollTop = jsonLeft.scrollTop;
        });
        jsonRight.addEventListener('scroll', () => {
            jsonLeft.scrollTop = jsonRight.scrollTop;
        });

        prevPage.addEventListener('click', () => render(filteredData, currentPage - 1));
        nextPage.addEventListener('click', () => render(filteredData, currentPage + 1));

        renderSummary(filteredData);
        render(filteredData, 1);
        searchInput.addEventListener('input', applySearch);
    </script>
</body>
</html>
