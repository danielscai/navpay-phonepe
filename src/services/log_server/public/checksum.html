<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checksum 调试</title>
    <style>
        :root {
            --bg: #0f1524;
            --panel: #182235;
            --border: #23324c;
            --text: #e6e9ef;
            --muted: #9aa4b2;
            --accent: #4ecca3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: #121a2b;
        }

        .topbar h1 {
            font-size: 18px;
            color: var(--accent);
        }

        .topbar a {
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 6px;
            background: var(--panel);
        }

        .container {
            max-width: 980px;
            margin: 24px auto;
            padding: 0 24px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            background: #0f1728;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        button {
            padding: 8px 14px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #08131f;
            font-weight: 600;
            cursor: pointer;
        }

        pre {
            background: #0b111d;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Checksum 调试</h1>
        <a href="/index.html">返回日志首页</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="row">
                <div>
                    <label>Path (encodedPath)</label>
                    <input id="path" value="/apis/tstore/v2/units/changes" />
                </div>
                <div>
                    <label>UUID (可为空)</label>
                    <input id="uuid" placeholder="留空自动生成" />
                </div>
            </div>
            <div style="margin-top:12px;">
                <label>Body (原始字符串)</label>
                <textarea id="body"></textarea>
            </div>
            <div class="actions">
                <button id="genBtn">生成 Checksum</button>
                <button id="healthBtn" type="button">检查服务状态</button>
            </div>
        </div>

        <div class="card">
            <label>响应</label>
            <pre id="output">等待调用...</pre>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const genBtn = document.getElementById('genBtn');
        const healthBtn = document.getElementById('healthBtn');

        async function callApi(path, payload) {
            const res = await fetch(path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return res.json();
        }

        genBtn.addEventListener('click', async () => {
            output.textContent = '请求中...';
            const path = document.getElementById('path').value.trim();
            const body = document.getElementById('body').value || '';
            const uuid = document.getElementById('uuid').value.trim();
            try {
                const data = await callApi('/api/checksum', { path, body, uuid });
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent = e.message;
            }
        });

        healthBtn.addEventListener('click', async () => {
            output.textContent = '请求中...';
            try {
                const res = await fetch('http://127.0.0.1:19090/health');
                const data = await res.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent = e.message;
            }
        });
    </script>
</body>
</html>
