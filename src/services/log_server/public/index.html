<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPS 请求拦截日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        /* 顶部栏 */
        .header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            color: #e94560;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: bold;
            color: #4ecca3;
        }

        .stat-value.warning {
            color: #ffc107;
        }

        .stat-value.error {
            color: #e94560;
        }

        /* 连接状态 */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ecca3;
        }

        .status-dot.disconnected {
            background: #e94560;
        }

        /* 工具栏 */
        .toolbar {
            padding: 12px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 16px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background: #3db892;
        }

        .btn-danger {
            background: #e94560;
            color: #fff;
        }

        .btn-danger:hover {
            background: #d63851;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        /* 日志列表 */
        .content {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 16px;
            padding: 16px 24px;
            height: calc(100vh - 112px);
        }

        .log-list {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-list-header {
            padding: 10px 12px;
            font-size: 12px;
            color: #6c757d;
            border-bottom: 1px solid #0f3460;
            background: #111a33;
        }

        .log-list-body {
            overflow-y: auto;
            flex: 1;
        }

        .log-item {
            border-bottom: 1px solid #0f3460;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .log-item:hover {
            background: rgba(78, 204, 163, 0.08);
        }

        .log-item.active {
            background: rgba(78, 204, 163, 0.15);
            border-left: 3px solid #4ecca3;
        }

        .log-item.token-detected {
            border-left: 4px solid #ffc107;
        }

        .log-item.error {
            border-left: 4px solid #e94560;
        }

        /* 日志头部 */
        .log-header {
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .log-id {
            font-size: 12px;
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            padding: 2px 6px;
            font-family: "JetBrains Mono", "Fira Code", "Source Code Pro", monospace;
            flex: 0 0 auto;
        }

        .log-id.method-GET { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; }
        .log-id.method-POST { background: #ffc107; color: #1a1a2e; border-color: #ffc107; }
        .log-id.method-PUT { background: #17a2b8; color: #fff; border-color: #17a2b8; }
        .log-id.method-DELETE { background: #e94560; color: #fff; border-color: #e94560; }
        .log-id.method-PATCH { background: #6f42c1; color: #fff; border-color: #6f42c1; }

        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .status-2xx { background: #4ecca3; color: #1a1a2e; }
        .status-3xx { background: #17a2b8; color: #fff; }
        .status-4xx { background: #ffc107; color: #1a1a2e; }
        .status-5xx { background: #e94560; color: #fff; }
        .status-0 { background: #6c757d; color: #fff; }

        .log-url {
            flex: 1;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            color: #adb5bd;
            display: flex;
            gap: 4px;
            min-width: 0;
            overflow: hidden;
        }

        .log-host {
            color: #8898a7;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .url-start,
        .url-end {
            color: #adb5bd;
            white-space: nowrap;
        }

        .url-start {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .url-end {
            flex: 0 0 auto;
        }

        .url-ellipsis {
            color: #6c757d;
            flex: 0 0 auto;
        }

        .url-tail {
            background: #1f2a4a;
            color: #d0d7e2;
            padding: 2px 6px;
            border-radius: 4px;
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .url-tail-strong {
            color: #ffffff;
            font-weight: 600;
        }

        .log-meta {
            display: flex;
            gap: 8px;
            font-size: 10px;
            color: #6c757d;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .duration {
            color: #4ecca3;
        }

        .token-warning {
            color: #ffc107;
            font-weight: bold;
        }

        /* 详情面板 */
        .log-detail {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
        }

        .detail-empty {
            color: #6c757d;
            text-align: center;
            padding: 60px 24px;
        }

        .detail-section {
            padding: 16px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #6c757d;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-url {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #adb5bd;
            word-break: break-all;
            margin-bottom: 12px;
        }

        /* 请求编辑器 - 紧凑版 */
        .request-editor {
            background: #0d1b2a;
            border: 1px solid #0f3460;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .request-url-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #0f3460;
        }

        .request-method-select {
            padding: 6px 8px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #4ecca3;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            min-width: 70px;
        }

        .request-method-select:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .request-url-input {
            flex: 1;
            padding: 6px 10px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            height: 30px;
            resize: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 18px;
        }

        .request-url-input.expanded {
            white-space: pre-wrap;
            overflow: hidden;
        }

        .request-url-input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .request-send-btn {
            padding: 6px 16px;
            background: #4ecca3;
            border: none;
            border-radius: 4px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .request-send-btn:hover {
            background: #3db892;
        }

        .request-send-btn:disabled {
            background: #0f3460;
            color: #6c757d;
            cursor: not-allowed;
        }

        .request-send-btn.loading {
            background: #17a2b8;
        }

        .request-copy-btn {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #6c757d;
            font-size: 12px;
            cursor: pointer;
        }

        .request-copy-btn:hover {
            border-color: #4ecca3;
            color: #4ecca3;
        }

        .request-tabs {
            display: flex;
            gap: 0;
            padding: 0 12px;
            border-bottom: 1px solid #0f3460;
            background: #111a33;
        }

        .request-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #6c757d;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .request-tab:hover {
            color: #adb5bd;
        }

        .request-tab.active {
            color: #4ecca3;
            border-bottom-color: #4ecca3;
        }

        .request-tab .tab-count {
            background: #0f3460;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 10px;
            margin-left: 4px;
        }

        .request-panel {
            display: none;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .request-panel.active {
            display: block;
        }

        .request-body-textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .request-body-textarea:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .request-header-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            align-items: center;
        }

        .request-header-row input {
            flex: 1;
            padding: 5px 8px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 3px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }

        .request-header-row input:first-child {
            flex: 0.4;
            color: #4ecca3;
        }

        .request-header-row input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .request-header-row .btn-remove {
            padding: 3px 8px;
            background: transparent;
            border: 1px solid transparent;
            color: #6c757d;
            cursor: pointer;
            border-radius: 3px;
        }

        .request-header-row .btn-remove:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .btn-add-row {
            padding: 4px 12px;
            background: transparent;
            border: 1px dashed #0f3460;
            border-radius: 3px;
            color: #6c757d;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
        }

        .btn-add-row:hover {
            border-color: #4ecca3;
            color: #4ecca3;
        }

        /* 响应区域 */
        .response-section {
            background: #0d1b2a;
            border: 1px solid #0f3460;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #111a33;
            border-bottom: 1px solid #0f3460;
        }

        .response-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .response-status-code {
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }

        .response-status-code.s2xx { background: #4ecca3; color: #1a1a2e; }
        .response-status-code.s3xx { background: #17a2b8; color: #fff; }
        .response-status-code.s4xx { background: #ffc107; color: #1a1a2e; }
        .response-status-code.s5xx { background: #e94560; color: #fff; }
        .response-status-code.error { background: #e94560; color: #fff; }

        .response-meta {
            font-size: 12px;
            color: #6c757d;
        }

        .response-tabs {
            display: flex;
            background: #0a1525;
            border-bottom: 1px solid #0f3460;
        }

        .response-tab {
            padding: 6px 14px;
            background: transparent;
            border: none;
            color: #6c757d;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .response-tab:hover {
            color: #adb5bd;
        }

        .response-tab.active {
            color: #4ecca3;
            border-bottom-color: #4ecca3;
        }

        .response-body {
            max-height: 250px;
            overflow: auto;
        }

        .response-body pre {
            margin: 0;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .response-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #6c757d;
            font-size: 13px;
        }

        .response-loading .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #0f3460;
            border-top-color: #4ecca3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        .header-count {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .detail-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .toggle-icon {
            margin-left: 6px;
            color: #6c757d;
        }

        .headers-section {
            display: none;
        }

        .column-title {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 8px;
        }

        /* Headers 表格 */
        .headers-table {
            width: 100%;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
            table-layout: fixed;
        }

        .headers-table tr {
            border-bottom: 1px solid #0f3460;
        }

        .headers-table tr:last-child {
            border-bottom: none;
        }

        .headers-table td {
            padding: 6px 0;
            vertical-align: top;
        }

        .headers-table .header-name {
            color: #4ecca3;
            width: 120px;
            padding-right: 16px;
            word-break: break-all;
        }

        .headers-table .header-value {
            color: #adb5bd;
            word-break: break-all;
        }

        .header-value.sensitive {
            color: #ffc107;
        }

        .headers-table .extra {
            display: none;
        }

        .headers-table.show-all .extra {
            display: table-row;
        }

        .headers-toggle {
            margin-top: 8px;
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
        }

        .headers-toggle:hover {
            color: #4ecca3;
        }

        /* JSON 格式化 */
        .json-viewer {
            background: #0d1b2a;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .headers-fixed {
            grid-template-columns: 1fr 1fr;
        }

        .headers-fixed > div {
            min-width: 0;
        }

        .json-key {
            color: #4ecca3;
        }

        .json-string {
            color: #ffc107;
        }

        .json-number {
            color: #e94560;
        }

        .json-boolean {
            color: #17a2b8;
        }

        .json-null {
            color: #6c757d;
        }

        .muted {
            color: #6c757d;
            font-style: italic;
        }

        /* 原始日志 */
        .raw-log-toggle {
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .raw-log-toggle:hover {
            color: #4ecca3;
        }

        .raw-log-content {
            display: none;
            margin-top: 12px;
        }

        .raw-log-content.visible {
            display: block;
        }

        .raw-log-content pre {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* curl 命令面板 */
        .curl-section {
            background: #0d1b2a;
            border: 1px solid #0f3460;
            border-radius: 8px;
            margin-top: 16px;
        }

        .curl-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #0f3460;
            background: #111a33;
            border-radius: 8px 8px 0 0;
        }

        .curl-header-title {
            font-size: 14px;
            font-weight: 600;
            color: #4ecca3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .curl-actions {
            display: flex;
            gap: 8px;
        }

        .curl-body {
            padding: 16px;
        }

        .curl-command {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            position: relative;
        }

        .curl-editable {
            width: 100%;
            min-height: 100px;
            background: #1a1a2e;
            border: 1px solid #4ecca3;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #e0e0e0;
            resize: vertical;
        }

        .curl-editable:focus {
            outline: none;
            border-color: #6fe8c0;
        }

        .curl-params {
            margin-bottom: 16px;
        }

        .curl-param-group {
            margin-bottom: 12px;
        }

        .curl-param-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
        }

        .curl-param-input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }

        .curl-param-input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .curl-headers-editor {
            max-height: 150px;
            overflow-y: auto;
        }

        .curl-header-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .curl-header-row input {
            flex: 1;
            padding: 6px 10px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }

        .curl-header-row input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .curl-header-row .btn-icon {
            padding: 4px 8px;
            font-size: 14px;
            background: transparent;
            border: 1px solid #0f3460;
            color: #6c757d;
            border-radius: 4px;
            cursor: pointer;
        }

        .curl-header-row .btn-icon:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .btn-add-header {
            padding: 4px 12px;
            font-size: 12px;
            background: transparent;
            border: 1px dashed #0f3460;
            color: #6c757d;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .btn-add-header:hover {
            border-color: #4ecca3;
            color: #4ecca3;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-icon-only {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid #0f3460;
        }

        .btn-icon-only:hover {
            background: #0f3460;
        }

        .copy-success {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4ecca3;
            color: #1a1a2e;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .curl-mode-toggle {
            display: flex;
            gap: 4px;
            background: #0f3460;
            border-radius: 4px;
            padding: 2px;
        }

        .curl-mode-btn {
            padding: 4px 12px;
            font-size: 12px;
            border: none;
            background: transparent;
            color: #6c757d;
            border-radius: 3px;
            cursor: pointer;
        }

        .curl-mode-btn.active {
            background: #4ecca3;
            color: #1a1a2e;
        }

        /* 响应结果区域 */
        .curl-response {
            margin-top: 16px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            overflow: hidden;
        }

        .curl-response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #111a33;
            border-bottom: 1px solid #0f3460;
        }

        .curl-response-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .curl-response-status .status-code {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .curl-response-status .status-code.success {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .curl-response-status .status-code.redirect {
            background: #17a2b8;
            color: #fff;
        }

        .curl-response-status .status-code.client-error {
            background: #ffc107;
            color: #1a1a2e;
        }

        .curl-response-status .status-code.server-error {
            background: #e94560;
            color: #fff;
        }

        .curl-response-status .status-code.error {
            background: #e94560;
            color: #fff;
        }

        .curl-response-meta {
            font-size: 12px;
            color: #6c757d;
        }

        .curl-response-body {
            max-height: 300px;
            overflow: auto;
        }

        .curl-response-body pre {
            margin: 0;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* checksum toggle */
        .checksum-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #cdd6e1;
            background: #0f3460;
            border: 1px solid #153a69;
            border-radius: 999px;
            padding: 4px 10px;
        }

        .checksum-toggle input {
            accent-color: #4ecca3;
        }

        .curl-response-tabs {
            display: flex;
            border-bottom: 1px solid #0f3460;
            background: #0d1b2a;
        }

        .curl-response-tab {
            padding: 8px 16px;
            font-size: 12px;
            color: #6c757d;
            background: transparent;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .curl-response-tab:hover {
            color: #adb5bd;
        }

        .curl-response-tab.active {
            color: #4ecca3;
            border-bottom-color: #4ecca3;
        }

        .curl-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #6c757d;
        }

        .curl-loading .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #0f3460;
            border-top-color: #4ecca3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-execute {
            background: #17a2b8;
            color: #fff;
        }

        .btn-execute:hover {
            background: #138496;
        }

        .btn-execute:disabled {
            background: #0f3460;
            color: #6c757d;
            cursor: not-allowed;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #1a4a7a;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                height: auto;
            }
            .log-detail {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HTTPS 请求拦截日志</h1>
        <div class="header-stats">
            <div class="stat-item">
                <span>总请求:</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-item">
                <span>Token 检测:</span>
                <span class="stat-value warning" id="stat-tokens">0</span>
            </div>
            <div class="stat-item">
                <span>错误:</span>
                <span class="stat-value error" id="stat-errors">0</span>
            </div>
            <div class="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">已连接</span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索 URL、请求体、响应体...">
        </div>
        <button class="btn btn-secondary" onclick="refreshLogs()">刷新</button>
        <button class="btn btn-danger" onclick="clearLogs()">清空日志</button>
        <a class="btn btn-secondary" href="/transactions.html">交易记录展示</a>
        <a class="btn btn-secondary" href="/checksum.html">Checksum 调试</a>
    </div>

    <div class="content">
        <div class="log-list" id="log-list">
            <div class="log-list-header">最新请求</div>
            <div class="log-list-body" id="log-list-body">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">📡</div>
                    <p>等待接收日志...</p>
                    <p style="margin-top: 8px; font-size: 12px;">确保 Android 应用已配置日志发送到此服务器</p>
                </div>
            </div>
        </div>
        <div class="log-detail" id="log-detail">
            <div class="detail-empty">请选择左侧日志查看详情</div>
        </div>
    </div>

    <script>
        // 状态
        let logs = [];
        let ws = null;
        let searchTimeout = null;
        let selectedLogId = null;

        // DOM 元素
        const logListBody = document.getElementById('log-list-body');
        const emptyState = document.getElementById('empty-state');
        const logDetail = document.getElementById('log-detail');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const searchInput = document.getElementById('search-input');

        // 初始化 WebSocket
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusDot.classList.remove('disconnected');
                statusText.textContent = '已连接';
            };

            ws.onclose = () => {
                statusDot.classList.add('disconnected');
                statusText.textContent = '已断开';
                // 尝试重连
                setTimeout(initWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);

                if (message.type === 'initial_logs') {
                    logs = message.data;
                    renderLogs();
                } else if (message.type === 'new_log') {
                    logs.unshift(message.data);
                    prependLog(message.data);
                    updateStats();
                } else if (message.type === 'logs_cleared') {
                    logs = [];
                    renderLogs();
                }
            };
        }

        // 渲染所有日志
        function renderLogs() {
            if (logs.length === 0) {
                logListBody.innerHTML = '';
                logListBody.appendChild(emptyState);
                emptyState.style.display = 'block';
                logDetail.innerHTML = '<div class="detail-empty">请选择左侧日志查看详情</div>';
                selectedLogId = null;
            } else {
                emptyState.style.display = 'none';
                logListBody.innerHTML = logs.map(log => createListItemHTML(log)).join('');
                if (!selectedLogId && logs[0]) {
                    selectLog(logs[0].id);
                } else {
                    markActive();
                }
            }
            updateStats();
        }

        // 添加单条日志到顶部
        function prependLog(log) {
            emptyState.style.display = 'none';
            const html = createListItemHTML(log);
            logListBody.insertAdjacentHTML('afterbegin', html);
            if (!selectedLogId) {
                selectLog(log.id);
            } else {
                markActive();
            }
        }

        function createListItemHTML(log) {
            const methodClass = `method-${log.method}`;
            const statusClass = getStatusClass(log.statusCode);
            const itemClass = [
                'log-item',
                log.tokenDetected ? 'token-detected' : '',
                log.error ? 'error' : ''
            ].filter(Boolean).join(' ');

            return `
                <div class="${itemClass}" data-id="${log.id}" onclick="selectLog('${log.id}')">
                    <div class="log-header">
                        <span class="log-id ${methodClass}">#${log.id}</span>
                        <span class="status-badge ${statusClass}" title="${log.statusCode || 'ERR'}"></span>
                        <span class="log-url" title="${escapeHtml(log.url)}">${shortenUrl(log.url)}</span>
                        <div class="log-meta">
                            <span>${formatTime(log.timestamp)}</span>
                            ${log.tokenDetected ? '<span class="token-warning">⚠️ Token</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectLog(id) {
            selectedLogId = id;
            markActive();
            const log = logs.find(l => String(l.id) === String(id));
            if (!log) {
                logDetail.innerHTML = '<div class="detail-empty">未找到日志详情</div>';
                return;
            }
            logDetail.innerHTML = createDetailHTML(log);
        }

        function expandUrlInput(el) {
            if (!el) return;
            el.classList.add('expanded');
            el.style.height = 'auto';
            el.style.height = `${el.scrollHeight}px`;
        }

        function collapseUrlInput(el) {
            if (!el) return;
            el.classList.remove('expanded');
            el.style.height = '30px';
        }

        function markActive() {
            document.querySelectorAll('.log-item').forEach(el => {
                el.classList.toggle('active', String(el.dataset.id) === String(selectedLogId));
            });
        }

        // 详情 HTML
        function createDetailHTML(log) {
            const requestHeaderCount = Object.keys(log.requestHeaders || {}).length;
            const responseHeaderCount = Object.keys(log.responseHeaders || {}).length;
            const isTstoreChanges = (log.url || '').includes('/apis/tstore/v2/units/changes');

            return `
                ${log.error ? `
                    <div class="detail-section">
                        <div class="detail-title">错误信息</div>
                        <div style="color: #e94560;">${escapeHtml(log.error)}</div>
                    </div>
                ` : ''}

                ${log.tokenDetected && log.tokenInfo ? `
                    <div class="detail-section" style="background: rgba(255, 193, 7, 0.1);">
                        <div class="detail-title">⚠️ Token 检测</div>
                        <pre style="color: #ffc107;">${escapeHtml(log.tokenInfo)}</pre>
                    </div>
                ` : ''}

                <div class="request-editor" id="request-editor-${log.id}">
                    <div class="request-url-bar">
                        <select class="request-method-select" id="req-method-${log.id}">
                            <option value="GET" ${log.method === 'GET' ? 'selected' : ''}>GET</option>
                            <option value="POST" ${log.method === 'POST' ? 'selected' : ''}>POST</option>
                            <option value="PUT" ${log.method === 'PUT' ? 'selected' : ''}>PUT</option>
                            <option value="DELETE" ${log.method === 'DELETE' ? 'selected' : ''}>DELETE</option>
                            <option value="PATCH" ${log.method === 'PATCH' ? 'selected' : ''}>PATCH</option>
                        </select>
                        <textarea class="request-url-input" id="req-url-${log.id}" onfocus="expandUrlInput(this)" onblur="collapseUrlInput(this)">${escapeHtml(log.url)}</textarea>
                        <button class="request-send-btn" id="req-send-${log.id}" onclick="sendRequest(${log.id})">发送</button>
                        <button class="request-copy-btn" onclick="copyAsCurl(${log.id})" title="复制为 cURL">📋</button>
                    </div>
                    ${isTstoreChanges ? `
                    <div style="margin-top:10px;">
                        <label class="checksum-toggle">
                            <input type="checkbox" id="req-checksum-${log.id}" checked>
                            使用本地 Checksum 服务
                        </label>
                        <div id="req-checksum-info-${log.id}" style="margin-top:6px; font-size:12px; color:#8aa0b6;"></div>
                    </div>` : ''}
                    <div class="request-tabs">
                        <button class="request-tab active" onclick="switchRequestTab(${log.id}, 'headers', this)">
                            Headers<span class="tab-count">${requestHeaderCount}</span>
                        </button>
                        <button class="request-tab" onclick="switchRequestTab(${log.id}, 'body', this)">Body</button>
                        <button class="request-tab" onclick="switchRequestTab(${log.id}, 'resp-headers', this)">
                            响应头<span class="tab-count">${responseHeaderCount}</span>
                        </button>
                    </div>
                    <div class="request-panel active" id="req-panel-headers-${log.id}">
                        <div id="req-headers-${log.id}">
                            ${renderEditableHeaderRows(log.requestHeaders, log.id)}
                        </div>
                        <button class="btn-add-row" onclick="addHeaderRow(${log.id})">+ Header</button>
                    </div>
                    <div class="request-panel" id="req-panel-body-${log.id}">
                        <textarea class="request-body-textarea" id="req-body-${log.id}" placeholder="请求体 (JSON/Form/Text)">${escapeHtml(log.requestBody || '')}</textarea>
                    </div>
                    <div class="request-panel" id="req-panel-resp-headers-${log.id}">
                        ${renderResponseHeadersReadonly(log.responseHeaders)}
                    </div>
                </div>

                <div id="response-container-${log.id}"></div>

                <div class="detail-section">
                    <div class="column-title">原始响应体</div>
                    <div class="json-viewer">${formatBody(log.responseBody)}</div>
                </div>

                <div class="detail-section">
                    <div class="raw-log-toggle" onclick="toggleRawLog(this);">
                        ▶ 查看原始日志
                    </div>
                    <div class="raw-log-content">
                        <pre>${escapeHtml(log.rawLog || JSON.stringify(log, null, 2))}</pre>
                    </div>
                </div>
            `;
        }

        // 渲染 Headers（默认折叠）
        function renderHeaders(headers, limit) {
            if (!headers || Object.keys(headers).length === 0) {
                return '<div style="color: #6c757d; font-style: italic;">无</div>';
            }

            const sensitiveHeaders = ['authorization', 'cookie', 'x-auth-token', 'api-key', 'token'];
            const entries = Object.entries(headers);

            return `
                <table class="headers-table">
                    ${entries.map(([key, value], index) => {
                        const isSensitive = sensitiveHeaders.some(h =>
                            key.toLowerCase().includes(h)
                        );
                        const extraClass = index >= limit ? 'extra' : '';
                        return `
                            <tr class="${extraClass}">
                                <td class="header-name">${escapeHtml(key)}</td>
                                <td class="header-value ${isSensitive ? 'sensitive' : ''}">${escapeHtml(value)}</td>
                            </tr>
                        `;
                    }).join('')}
                </table>
            `;
        }

        // 格式化 Body (JSON)
        function formatBody(body) {
            if (!body) return '<span class="muted">空</span>';

            const text = String(body).trim();
            if (looksLikeJson(text)) {
                try {
                    const parsed = JSON.parse(text);
                    return syntaxHighlight(JSON.stringify(parsed, null, 2));
                } catch (e) {
                    // fallthrough to raw
                }
            }
            return escapeHtml(body);
        }

        // JSON 语法高亮
        function syntaxHighlight(json) {
            json = escapeHtml(json);
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // 获取状态码样式类
        function getStatusClass(code) {
            if (!code) return 'status-0';
            if (code >= 200 && code < 300) return 'status-2xx';
            if (code >= 300 && code < 400) return 'status-3xx';
            if (code >= 400 && code < 500) return 'status-4xx';
            if (code >= 500) return 'status-5xx';
            return 'status-0';
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '';
            let value = timestamp;
            if (typeof value === 'string' && value.trim() !== '') {
                const asNumber = Number(value);
                if (!Number.isNaN(asNumber)) {
                    value = asNumber;
                }
            }
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return 'invalid date';
            }
            return date.toLocaleTimeString('zh-CN');
        }

        // HTML 转义
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function looksLikeJson(text) {
            if (!text) return false;
            return (text.startsWith('{') && text.endsWith('}')) ||
                (text.startsWith('[') && text.endsWith(']'));
        }

        function shortenUrl(url, maxPathLength = 90) {
            if (!url) return '';
            const str = String(url);
            let tail = str;
            let hasQuery = false;
            let hasHash = false;
            try {
                const u = new URL(str);
                hasQuery = !!u.search;
                hasHash = !!u.hash;
                tail = (u.pathname || '/') + (u.search || '') + (u.hash || '');
            } catch (e) {
                const noScheme = str.replace(/^https?:\/\//, '');
                const slash = noScheme.indexOf('/');
                if (slash > -1) {
                    tail = noScheme.slice(slash);
                } else {
                    tail = '';
                }
            }
            const path = tail.startsWith('/') ? tail : `/${tail}`;
            const [pathOnly, queryAndHash = ''] = path.split(/(?=[?#])/);
            const parts = pathOnly.split('/').filter(Boolean);
            const last = parts.length ? parts[parts.length - 1] : '';
            const prev = parts.length > 1 ? parts[parts.length - 2] : '';
            const basePath = parts.length > 2 ? `/${parts[0]}/…/` : '/';
            const strongTwo = [prev, last].filter(Boolean).join('/');
            const strongOne = last || '';
            let displayPath = `${basePath}${strongTwo || ''}`;
            if (displayPath.length > maxPathLength && strongOne) {
                displayPath = `${basePath}${strongOne}`;
            }
            const queryMarker = (hasQuery || hasHash || queryAndHash) ? ' ?…' : '';
            displayPath += queryMarker;
            if (displayPath.length > maxPathLength) {
                const head = Math.floor(maxPathLength * 0.6);
                const tailLen = maxPathLength - head - 1;
                displayPath = `${displayPath.slice(0, head)}…${displayPath.slice(-tailLen)}`;
            }
            let strongPath = (displayPath.includes(strongTwo) && strongTwo) ? strongTwo : strongOne;
            if (strongPath && displayPath.includes(strongPath)) {
                displayPath = displayPath.replace(
                    strongPath,
                    `<span class="url-tail-strong">${escapeHtml(strongPath)}</span>`
                );
            } else {
                displayPath = escapeHtml(displayPath);
            }
            return `<span class="url-end url-tail">${displayPath}</span>`;
        }

        function copyText(text) {
            if (!text) return;
            navigator.clipboard?.writeText(text).catch(() => {});
        }

        // 切换原始日志
        function toggleRawLog(element) {
            const content = element.nextElementSibling;
            const isVisible = content.classList.toggle('visible');
            element.innerHTML = isVisible ? '▼ 隐藏原始日志' : '▶ 查看原始日志';
        }

        function toggleHeadersAll(sectionId, element) {
            const section = document.getElementById(sectionId);
            if (!section) return;
            const isVisible = section.style.display !== 'none';
            section.style.display = isVisible ? 'none' : 'block';
            if (element) {
                element.innerHTML = isVisible
                    ? '展开请求/响应头<span class="toggle-icon">▸</span>'
                    : '收起请求/响应头<span class="toggle-icon">▾</span>';
            }
            if (!isVisible) {
                section.querySelectorAll('.headers-table').forEach(t => t.classList.add('show-all'));
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-total').textContent = logs.length;
            document.getElementById('stat-tokens').textContent =
                logs.filter(l => l.tokenDetected).length;
            document.getElementById('stat-errors').textContent =
                logs.filter(l => l.error).length;
        }

        // 刷新日志
        async function refreshLogs() {
            try {
                const response = await fetch('/api/logs?limit=100');
                const result = await response.json();
                if (result.success) {
                    logs = result.data;
                    renderLogs();
                }
            } catch (error) {
                console.error('Error refreshing logs:', error);
            }
        }

        // 清空日志
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？')) return;

            try {
                const response = await fetch('/api/logs', { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    logs = [];
                    renderLogs();
                }
            } catch (error) {
                console.error('Error clearing logs:', error);
            }
        }

        // 搜索
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const query = e.target.value.trim();
                if (query) {
                    try {
                        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                        const result = await response.json();
                        if (result.success) {
                            logs = result.data;
                            renderLogs();
                        }
                    } catch (error) {
                        console.error('Error searching:', error);
                    }
                } else {
                    refreshLogs();
                }
            }, 300);
        });

        // ===== 请求编辑器功能 =====

        // 渲染可编辑的 header 行
        function renderEditableHeaderRows(headers, logId) {
            if (!headers || Object.keys(headers).length === 0) {
                return '<div style="color: #6c757d; font-size: 12px; padding: 8px 0;">无请求头</div>';
            }

            const skipHeaders = ['content-length', 'host', 'connection', 'accept-encoding'];
            return Object.entries(headers)
                .filter(([key]) => !skipHeaders.includes(key.toLowerCase()))
                .map(([key, value]) => `
                    <div class="request-header-row">
                        <input type="text" value="${escapeHtml(key)}" placeholder="Name">
                        <input type="text" value="${escapeHtml(value)}" placeholder="Value">
                        <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
                    </div>
                `).join('');
        }

        // 渲染只读响应头
        function renderResponseHeadersReadonly(headers) {
            if (!headers || Object.keys(headers).length === 0) {
                return '<div style="color: #6c757d; font-size: 12px;">无响应头</div>';
            }
            return `<div style="font-family: monospace; font-size: 12px; line-height: 1.6;">
                ${Object.entries(headers).map(([key, value]) =>
                    `<div><span style="color: #4ecca3;">${escapeHtml(key)}</span>: ${escapeHtml(value)}</div>`
                ).join('')}
            </div>`;
        }

        // 添加 header 行
        function addHeaderRow(logId, name = '', value = '') {
            const container = document.getElementById(`req-headers-${logId}`);
            // 移除空提示
            const emptyHint = container.querySelector('div[style*="color: #6c757d"]');
            if (emptyHint) emptyHint.remove();

            const row = document.createElement('div');
            row.className = 'request-header-row';
            row.innerHTML = `
                <input type="text" value="${escapeHtml(name)}" placeholder="Name">
                <input type="text" value="${escapeHtml(value)}" placeholder="Value">
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(row);
        }

        function updateChecksumHeaderUI(logId, checksum) {
            const rows = document.querySelectorAll(`#req-headers-${logId} .request-header-row`);
            for (const row of rows) {
                const inputs = row.querySelectorAll('input');
                if (inputs[0] && inputs[0].value.trim().toLowerCase() === 'x-request-checksum-v4') {
                    inputs[1].value = checksum;
                    return;
                }
            }
            addHeaderRow(logId, 'X-REQUEST-CHECKSUM-V4', checksum);
        }

        // 切换请求 tab
        function switchRequestTab(logId, tab, btn) {
            const panels = ['headers', 'body', 'resp-headers'];
            panels.forEach(p => {
                const panel = document.getElementById(`req-panel-${p}-${logId}`);
                if (panel) panel.classList.remove('active');
            });

            const tabs = btn.parentElement.querySelectorAll('.request-tab');
            tabs.forEach(t => t.classList.remove('active'));

            btn.classList.add('active');
            const panel = document.getElementById(`req-panel-${tab}-${logId}`);
            if (panel) panel.classList.add('active');
        }

        // 发送请求
        async function sendRequest(logId) {
            const btn = document.getElementById(`req-send-${logId}`);
            const container = document.getElementById(`response-container-${logId}`);

            // 收集请求参数
            const method = document.getElementById(`req-method-${logId}`).value;
            const url = document.getElementById(`req-url-${logId}`).value;
            const body = document.getElementById(`req-body-${logId}`).value;

            const headers = {};
            const headerRows = document.querySelectorAll(`#req-headers-${logId} .request-header-row`);
            headerRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0] && inputs[1] && inputs[0].value.trim()) {
                    headers[inputs[0].value] = inputs[1].value;
                }
            });

            // 若为 tstore changes，且启用 checksum 服务，则自动更新 checksum header
            try {
                const checksumToggle = document.getElementById(`req-checksum-${logId}`);
                if (checksumToggle && checksumToggle.checked) {
                    const urlObj = new URL(url);
                    const path = urlObj.pathname;
                    const checksumResp = await fetch('/api/checksum', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, body })
                    });
                    const checksumJson = await checksumResp.json();
                    if (checksumJson.success && checksumJson.data && checksumJson.data.checksum) {
                        const checksum = checksumJson.data.checksum;
                        headers['X-REQUEST-CHECKSUM-V4'] = checksum;
                        if (!headers['X-REQUEST-ALIAS']) {
                            headers['X-REQUEST-ALIAS'] = 'V4_1';
                        }
                        updateChecksumHeaderUI(logId, checksum);
                        const info = document.getElementById(`req-checksum-info-${logId}`);
                        if (info) {
                            info.textContent = `已使用本地 checksum：${checksum.slice(0, 16)}...`;
                        }
                        showToast('✓ 已更新 checksum');
                    } else {
                        throw new Error((checksumJson && checksumJson.error) || 'checksum failed');
                    }
                }
            } catch (e) {
                renderResponseError(logId, `checksum 生成失败: ${e.message}`);
                return;
            }

            // 显示 loading
            btn.disabled = true;
            btn.textContent = '发送中...';
            btn.classList.add('loading');

            container.innerHTML = `
                <div class="response-section">
                    <div class="response-loading">
                        <div class="spinner"></div>
                        <span>正在发送请求...</span>
                    </div>
                </div>
            `;

            try {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method, url, headers, body }),
                });

                const result = await response.json();

                if (result.success) {
                    renderResponse(logId, result.data, result.skippedHeaders);
                } else {
                    renderResponseError(logId, result.error);
                }
            } catch (error) {
                renderResponseError(logId, error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
                btn.classList.remove('loading');
            }
        }

        // 渲染响应
        function renderResponse(logId, data, skippedHeaders) {
            const container = document.getElementById(`response-container-${logId}`);
            const statusClass = getStatusCodeClass(data.statusCode);

            let warningHtml = '';
            if (skippedHeaders && skippedHeaders.length > 0) {
                warningHtml = `
                    <div style="background: rgba(255, 193, 7, 0.1); border-bottom: 1px solid #0f3460; padding: 8px 12px; font-size: 12px; color: #ffc107;">
                        ⚠️ 已跳过脱敏的 Headers: <code style="background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 3px;">${skippedHeaders.join('</code>, <code style="background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 3px;">')}</code>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="response-section">
                    ${warningHtml}
                    <div class="response-header">
                        <div class="response-status">
                            <span class="response-status-code ${statusClass}">${data.statusCode}</span>
                            <span>${data.statusText}</span>
                        </div>
                        <div class="response-meta">${data.duration}ms</div>
                    </div>
                    <div class="response-tabs">
                        <button class="response-tab active" onclick="switchResponseTab(${logId}, 'body', this)">Body</button>
                        <button class="response-tab" onclick="switchResponseTab(${logId}, 'headers', this)">Headers (${Object.keys(data.headers).length})</button>
                    </div>
                    <div class="response-body">
                        <div id="resp-body-${logId}">
                            <pre>${formatJsonBody(data.body)}</pre>
                        </div>
                        <div id="resp-headers-${logId}" style="display:none;">
                            <pre>${formatHeadersDisplay(data.headers)}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染错误
        function renderResponseError(logId, error) {
            const container = document.getElementById(`response-container-${logId}`);
            container.innerHTML = `
                <div class="response-section">
                    <div class="response-header">
                        <div class="response-status">
                            <span class="response-status-code error">错误</span>
                        </div>
                    </div>
                    <div class="response-body">
                        <pre style="color: #e94560;">${escapeHtml(error)}</pre>
                    </div>
                </div>
            `;
        }

        // 切换响应 tab
        function switchResponseTab(logId, tab, btn) {
            const bodyDiv = document.getElementById(`resp-body-${logId}`);
            const headersDiv = document.getElementById(`resp-headers-${logId}`);
            const tabs = btn.parentElement.querySelectorAll('.response-tab');

            tabs.forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            bodyDiv.style.display = tab === 'body' ? 'block' : 'none';
            headersDiv.style.display = tab === 'headers' ? 'block' : 'none';
        }

        // 状态码样式
        function getStatusCodeClass(code) {
            if (code >= 200 && code < 300) return 's2xx';
            if (code >= 300 && code < 400) return 's3xx';
            if (code >= 400 && code < 500) return 's4xx';
            if (code >= 500) return 's5xx';
            return 'error';
        }

        // 格式化 JSON body
        function formatJsonBody(body) {
            if (!body) return '<span class="muted">空</span>';
            const text = String(body).trim();
            if (looksLikeJson(text)) {
                try {
                    const parsed = JSON.parse(text);
                    return syntaxHighlight(JSON.stringify(parsed, null, 2));
                } catch (e) {}
            }
            return escapeHtml(body);
        }

        // 格式化 headers 显示
        function formatHeadersDisplay(headers) {
            if (!headers || Object.keys(headers).length === 0) {
                return '<span class="muted">无</span>';
            }
            return Object.entries(headers)
                .map(([key, value]) => `<span class="json-key">${escapeHtml(key)}</span>: ${escapeHtml(value)}`)
                .join('\n');
        }

        // 复制为 curl
        function copyAsCurl(logId) {
            const method = document.getElementById(`req-method-${logId}`).value;
            const url = document.getElementById(`req-url-${logId}`).value;
            const body = document.getElementById(`req-body-${logId}`).value;

            const parts = ['curl'];
            if (method !== 'GET') parts.push(`-X ${method}`);
            parts.push(`'${url}'`);

            const headerRows = document.querySelectorAll(`#req-headers-${logId} .request-header-row`);
            headerRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0] && inputs[1] && inputs[0].value.trim()) {
                    parts.push(`-H '${inputs[0].value}: ${inputs[1].value}'`);
                }
            });

            if (body && body.trim()) {
                parts.push(`-d '${body.replace(/'/g, "'\\''")}'`);
            }

            const curlCmd = parts.join(' \\\n  ');

            navigator.clipboard.writeText(curlCmd).then(() => {
                showToast('✓ 已复制 cURL 命令');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = curlCmd;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✓ 已复制 cURL 命令');
            });
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'copy-success';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 初始化
        initWebSocket();
    </script>

    <!-- livereload 热加载支持 (仅开发模式) -->
    <script>
        (function() {
            const script = document.createElement('script');
            script.src = 'http://' + (location.host.split(':')[0] || 'localhost') + ':35729/livereload.js?snipver=1';
            script.async = true;
            script.onerror = function() {
                console.log('[Dev] livereload 未启动，跳过热加载');
            };
            document.body.appendChild(script);
        })();
    </script>
</body>
